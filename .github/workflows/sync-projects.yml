name: Sync GitHub Projects

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch repos + contribution data
        env:
          GH_TOKEN: ${{ secrets.PORTFOLIO_SYNC_TOKEN }}
        run: node scripts/sync-github-projects.mjs

      - name: Commit updated data
        run: |
          git config user.name "portfolio-bot"
          git config user.email "actions@github.com"
          git add src/data/projects.json
          git diff --staged --quiet || {
            git commit -m "chore: sync GitHub projects [auto]"
            git push
          }